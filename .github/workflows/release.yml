name: CMake Release Builder

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build_type: [Release]

        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
            artifact_name: rubixed.exe
            asset_name: rubixed-windows.exe

          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
            artifact_name: rubixed
            asset_name: rubixed-linux

          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++
            artifact_name: rubixed
            asset_name: rubixed-macos

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxrandr-dev libxi-dev \
            libxinerama-dev libxcursor-dev libgl1-mesa-dev

      # ---------------------------
      # IMPORTANT FIX: build outside workspace
      # ---------------------------
      - name: Create build directory
        id: strings
        shell: bash
        run: |
          echo "build-output-dir=${{ runner.temp }}/build" >> "$GITHUB_OUTPUT"

      - name: Configure CMake
        run: >
          cmake -S ${{ github.workspace }}
          -B ${{ steps.strings.outputs.build-output-dir }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}

      - name: Build Project
        run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

      - name: Prepare Artifact
        shell: bash
        run: |
          # Check if the binary is inside a Release folder (typical for Windows/MSVC multi-config)
          if [ -f "${{ steps.strings.outputs.build-output-dir }}/Release/${{ matrix.artifact_name }}" ]; then
            mv "${{ steps.strings.outputs.build-output-dir }}/Release/${{ matrix.artifact_name }}" "${{ github.workspace }}/${{ matrix.asset_name }}"
          else
            # Fallback for single-config generators (Linux/macOS)
            mv "${{ steps.strings.outputs.build-output-dir }}/${{ matrix.artifact_name }}" "${{ github.workspace }}/${{ matrix.asset_name }}"
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}